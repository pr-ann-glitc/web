<html>
    <head>
        <title>Список дел</title>
        <link rel="icon" type="image/png" href="./images/icon.png">
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body class="container">
        <header>
                <img class="imagef" src="./images/koshka-1.png">
                <h1>Список дел</h1>
        </header>
        <div class="form-c">
            <form class="form" id="myForm">
                <div class="div-create">
                    <input type="text" id="title-task" class="input" placeholder="Новый элемент списка">
                    <button class="button-create" id="button-create" type="submit">Создать</button>
                    <button class="button-reset" id="button-reset" type="reset">Очистить</button>
                </div>
            </form>
            <ol id="list" class="list"></ol>
            <div class="row">
                <div class="refs">
                    <a id="done" href="#list">СДЕЛАНО (0)</a>
                    <a id="ndone" href="#list">НЕ СДЕЛАНО (0)</a>
                    <a id="all" href="#list">ВСЕ (0)</a>
                    <a id="sort" href="#sort-div">⬆⬇</a>
                </div>
                <div id="sort-div" class="refs">
                    <span id="from-new">От новых к старым</span>
                    <br>
                    <span id="from-old">От старых к новым</span>
                    <br>
                    <span id="start">А-Я</span>
                    <br>
                    <span id="finish">Я-А</span>
                </div>
            </div>
            <div class="row">
                <button class="button-reset-mini" id="reset-filters">Очистить фильтры</button>
                <button class="button-reset-mini" id="delete-tasks">Удалить все задачи</button>
            </div>
            
        </div>
            
        <footer>
            <hr/>
            <p>Copyright &#169;</p>
        </footer>
        <script src="script.js"></script>

    </body>
</html>
