<!DOCTYPE html>
<html>
    <head>
        <title> lab 8</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <h1>Таймеры</h1>
        <div class="task">
            <h2>counter(n)</h2>
            <input id="input-task1" type="number" placeholder="Начальное значение n">
            <p>Таймер: <span id="result1"></span></p>
            <button class="button-start">Start</button> 
        </div>
        
        <div class="task">
            <h2>createCounter()</h2>
            <input id="input-task2" type="number" placeholder="Начальное значение n">
            <p>Таймер: <span id="result2"></span></p>
            <button class="button-start" id="button-start">Start</button> 
            <button class="button-start" id="button-pause">Pause</button> 
            <button class="button-start" id="button-stop">Stop</button> 
        </div>

        <h1>Promise</h1>

        <div class="task">
            <h2>delay(n)</h2>
            <input id="input-task3" type="number" placeholder="Значение n">
            <p>Resolve: <span id="result3"></span></p>
            <button class="button-start" id="button-resolve">Start</button> 
        </div>

        <div class="task">
            <h2>timer через delay(n)</h2>
            <input id="input-task4" type="number" placeholder="Значение n">
            <p>Timer: <span id="result4"></span></p>
            <button class="button-start" id="button-resolve1">Start</button> 
        </div>

        <div class="task">
            <h2>запрос на GitHub</h2>
            <input id="input-task5" type="text" placeholder="userName in GitHub">
            <p>Result: <span id="result5"></span></p>
            <button class="button-start" id="button-fetch">Start</button> 
        </div>

        <script src="script.js"></script>
    </body>
</html>
